# Blueprint reference: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sneakers-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/live
    maxShutdownDelaySeconds: 90
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
      - key: LOG_LEVEL
        value: info
      - key: ANALYTICS_CACHE_TTL
        value: "300"
      - key: ANALYTICS_MAX_BATCH_SIZE
        value: "1000"
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
    disk:
      name: logs
      mountPath: /app/logs
      sizeGB: 1
    autoDeploy: true
